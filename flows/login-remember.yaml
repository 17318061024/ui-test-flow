id: login-remember
name: 登录流程_记住密码
description: 验证记住密码选项
version: 1
tags:
  - 登录

nodes:
  - id: start
    type: Start
    label: 开始

  - id: input-username
    type: Action
    label: 输入用户名
    action:
      method: input
      target: 用户名输入框
      value: testuser

  - id: input-password
    type: Action
    label: 输入密码
    action:
      method: input
      target: 密码输入框
      value: 123456

  - id: check-remember
    type: Condition
    label: 是否记住密码
    condition:
      variable: rememberMe
      operator: "=="
      value: "true"

  - id: check-remember-me
    type: Action
    label: 勾选记住我
    action:
      method: click
      target: 记住我复选框

  - id: skip-remember
    type: Action
    label: 不勾选
    action:
      method: wait
      target: 跳过

  - id: click-login
    type: Action
    label: 点击登录
    action:
      method: click
      target: 登录按钮

  - id: end
    type: End
    label: 结束

edges:
  - source: start
    target: input-username
  - source: input-username
    target: input-password
  - source: input-password
    target: check-remember
  - source: check-remember
    target: check-remember-me
    label: "是"
  - source: check-remember
    target: skip-remember
    label: "否"
  - source: check-remember-me
    target: click-login
  - source: skip-remember
    target: click-login
  - source: click-login
    target: end
