id: search
name: 商品搜索流程
description: 搜索商品并验证结果
version: 1
tags:
  - 搜索
  - 商品

nodes:
  - id: start
    type: Start
    label: 开始

  - id: input-keyword
    type: Action
    label: 输入搜索关键词
    action:
      method: input
      target: 搜索框
      value: iPhone

  - id: click-search
    type: Action
    label: 点击搜索
    action:
      method: click
      target: 搜索按钮

  - id: assert-results
    type: Assert
    label: 验证搜索结果
    assert:
      type: visible
      target: 搜索结果列表
      expected: "true"

  - id: end
    type: End
    label: 结束

edges:
  - source: start
    target: input-keyword
  - source: input-keyword
    target: click-search
  - source: click-search
    target: assert-results
  - source: assert-results
    target: end
